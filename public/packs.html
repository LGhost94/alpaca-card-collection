<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packs - Alpaca Cromos</title>

    <link rel="icon" type="image/png" href="/images/alpaca.png?v=3">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<nav>
    <div class="logo">
        <img src="/images/alpaca.png" class="logo-img">
        Alpaca Cromos
    </div>

    <div class="menu">
        <a href="/">Início</a>
        <a href="/collection">Coleção</a>
        <a href="/profile">Perfil</a>
    </div>
</nav>

<main class="packs-page">

    <section class="pack-stage">

        <h1>🎁 Pack Ohana</h1>

        <p id="packMessage">
            Abre um pack e revela 5 cartas da tua coleção.
        </p>

        <div class="pack-box" id="packBox">
            <img src="/images/alpaca.png" alt="Pack Alpaca">
            <h2>Pack Ohana</h2>
            <span>Clica para abrir</span>
        </div>

        <button class="loginButton" id="openPackButton">
            Abrir Pack
        </button>

        <div class="cards-reveal" id="cardsReveal"></div>

        <a href="/collection" class="loginButton hidden" id="goCollectionButton">
            Ver Coleção
        </a>

    </section>

</main>

<script src="/js/site.js?v=4"></script>
<script src="/js/packs.js?v=1"></script>
<script src="/js/footer.js?v=2"></script>

</body>
</html>
